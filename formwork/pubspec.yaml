name: formwork
description: "FormWork AI - AI-powered CAD design validation platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Networking
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # File Picker
  file_picker: ^8.1.2

  # SVG Rendering
  flutter_svg: ^2.0.10+1

  # URL Launcher (PDF download)
  url_launcher: ^6.3.0

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
